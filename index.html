		<script src="js/layui-v2.5.5/layui/layui.js" type="text/javascript" charset="utf-8"></script>
		<script type="text/javascript">
			layui.use(['laydate', 'laypage', 'layer', 'table', 'element'], function() {

				var laydate = layui.laydate //日期
					,
					laypage = layui.laypage //分页
					,
					layer = layui.layer //弹层
					,
					table = layui.table //表格
					,
					element = layui.element //元素操作
					,
					$ = layui.jquery
				////向世界问个好
				//layer.msg('Hello World');
				//
				//监听Tab切换
				element.on('tab(demo11)', function(data) {
					layer.tips('切换了 ' + data.index + '：' + this.innerHTML, this, {
						tips: 1
					});
				});

	/*
   * table接受数据
   */
  
  table.render({
    elem: '#demo11'
    ,height: 420
    ,url: 'http://www.mbystudents.cn/FaceMainF/FenPageServlet'//数据接口
    ,where:{
    	tea_class:"16级网络班"
    }
    ,title: '请假表'
    ,toolbar: 'default' //开启工具栏，此处显示默认图标，可以自定义模板，详见文档
    ,totalRow: true //开启合计行
    ,parseData:function(res){
    	console.log(res);
    	return{
    		"code":0,
    		"msg":"",
    		"count":1000,
    		"data":res
    	};
    	
    }
    ,request: {
		  pageName: 'pageNo' //页码的参数名称，默认：page
		  ,limitName: 'pageSize' //每页数据量的参数名，默认：limit
				    	}
    ,page:{
    	limit:5,
    	limits:[5,10,15,20,25]
    }
    ,cols: [[ //表头
      {type: 'checkbox', fixed: 'left'}
      ,{field: 'stu_id', title: '学号', width:150, sort: true,}
      ,{field: 'stu_name', title: '姓名', width: 100}
      ,{field: 'qj_type', title: '请假类型', width:90}
      ,{field: 'qj_stime', title: '请假开始时间', width: 100, sort: true}
      ,{field: 'qj_etime', title: '请假结束时间', width:100, sort: true}
      ,{field: 'qj_reason', title: '请假原因', width: 100}
      ,{field: 'qj_state', title: '审批状态', width:100} 
      ,{field: 'approver', title: '审批人', width: 80}
     
    ]]
    
  });
  


				var active = {
					//在这里给active绑定几项事件，后面可通过active调用这些事件
					tabAdd: function(url, id, name) {
						//新增一个Tab项 传入三个参数，分别对应其标题，tab页面的地址，还有一个规定的id，是标签中data-id的属性值
						//关于tabAdd的方法所传入的参数可看layui的开发文档中基础方法部分
						element.tabAdd('addDemo', {
							title: name,
							content: '<iframe data-frameid="' + id + '" scrolling="no" frameborder="0" src="' + url + '" style="width:100%;height:600px"></iframe>',
							id: id //规定好的id
						})
						element.render('tab');

					},
					tabChange: function(id) {
						//切换到指定Tab项
						element.tabChange('addDemo', id); //根据传入的id传入到指定的tab项
					},
					tabDelete: function(id) {
						element.tabDelete("addDemo", id); //删除
					},
					tabDeleteAll: function(ids) { //删除所有
						$.each(ids, function(i, item) {
							element.tabDelete("addDemo", item); //ids是一个数组，里面存放了多个id，调用tabDelete方法分别删除
						})
					}
				};

				//当点击有site-demo-active属性的标签时，即左侧菜单栏中内容 ，触发点击事件
				$('.lll').on('click', function() {
					//alert("hello")
					var dataid = $(this);

					//这时会判断右侧.layui-tab-title属性下的有lay-id属性的li的数目，即已经打开的tab项数目
					if($(".layui-tab-title li[lay-id]").length <= 0) {
						//如果比零小，则直接打开新的tab项
						active.tabAdd(dataid.attr("data-url"), dataid.attr("data-id"), dataid.attr("data-title"));
					} else {
						//否则判断该tab项是否以及存在
						//alert(2)
						var isData = false; //初始化一个标志，为false说明未打开该tab项 为true则说明已有
						$.each($(".layui-tab-title li[lay-id]"), function() {
							//如果点击左侧菜单栏所传入的id 在右侧tab项中的lay-id属性可以找到，则说明该tab项已经打开
							if($(this).attr("lay-id") == dataid.attr("data-id")) {
								isData = true;
							}
							//alert(isData)
						})
						if(isData == false) {
							//标志为false 新增一个tab项
							active.tabAdd(dataid.attr("data-url"), dataid.attr("data-id"), dataid.attr("data-title"));
						}
					}
					//最后不管是否新增tab，最后都转到要打开的选项页面上
					active.tabChange(dataid.attr("data-id")); 
				})

			});
		</script>
